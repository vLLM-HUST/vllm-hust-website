name: ci

on:
  push:
    branches: [main, main-dev]
  pull_request:
    branches: [main, main-dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run pre-commit
        run: pre-commit run --all-files
        env:
          SKIP: ${{ github.ref == 'refs/heads/main' && 'no-commit-to-branch' || '' }}
      - name: Run unit tests
        run: pytest tests/ -v
      - name: Verify repository hook templates
        run: |
          test -f hooks/pre-commit
          test -f hooks/pre-push
          bash -n hooks/pre-commit
          bash -n hooks/pre-push
          grep -q 'ln -sf "../../hooks/pre-commit"' quickstart.sh
          grep -q 'ln -sf "../../hooks/pre-push"' quickstart.sh
